<div class="p-4 max-w-sm mx-auto mt-10 border border-black">
  <h2 class="text-xl font-bold mb-4">Login</h2>

  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

    <div class="flex flex-col">
      <label class="mb-1 font-bold">Email</label>
      <input type="email" name="email" [(ngModel)]="email" required class="border border-gray-400 p-2">
    </div>

    <div class="flex flex-col">
      <label class="mb-1 font-bold">Password</label>
      <input type="password" name="password" [(ngModel)]="password" required class="border border-gray-400 p-2">
    </div>

    @if (errorMessage){
      <div  class="bg-red-200 text-red-800 p-2 border border-red-800">
        {{ errorMessage }}
      </div>
    }


    <button type="submit" class="bg-black text-white p-2 font-bold hover:bg-gray-800 cursor-pointer">
      ENTRA
    </button>
  </form>
  <a routerLink="/register" class="underline hover:text-black cursor-pointer">
    Non hai un account? Registrati ora
  </a>

</div>
