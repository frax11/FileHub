<div class="container">
    <h1>Benvenuto, {{ user?.name }}!</h1>
    
    <div *ngIf="user?.isAdmin" class="admin-badge">
        Sei un amministratore
    </div>
    
    <p><strong>Email:</strong> {{ user?.email }}</p>
    <p><strong>Nome completo:</strong> {{ user?.name }} {{ user?.surname }}</p>
    
    <button (click)="logout()">Logout</button>
</div>
